<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>German Verbs — A1 & A2 Reference</title>
<style>
  :root {
    --bg: #fafaf8;
    --surface: #ffffff;
    --border: #e8e6e0;
    --border2: #d4d1c8;
    --text: #1a1a18;
    --muted: #6b6960;
    --faint: #9b9890;
    --acc-blue: #1a5fa8;
    --acc-blue-bg: #e8f0fb;
    --acc-blue-border: #b3cef0;
    --acc-green: #1a7a4a;
    --acc-green-bg: #e6f5ed;
    --acc-green-border: #9dd4b8;
    --acc-amber: #8a5000;
    --acc-amber-bg: #fef3e2;
    --acc-amber-border: #f0c97a;
    --acc-purple: #5a35a8;
    --acc-purple-bg: #f0ecfb;
    --acc-purple-border: #c5b4ee;
    --acc-coral: #a03020;
    --acc-coral-bg: #fbeee9;
    --acc-coral-border: #e8b4a4;
    --acc-teal: #1a7070;
    --acc-teal-bg: #e6f5f5;
    --acc-teal-border: #9dd4d4;
    --radius: 8px;
    --radius-sm: 5px;
    --shadow: 0 1px 3px rgba(0,0,0,0.07), 0 1px 2px rgba(0,0,0,0.04);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #141412;
      --surface: #1e1e1c;
      --border: #2e2e2a;
      --border2: #3e3e3a;
      --text: #e8e6e0;
      --muted: #9b9890;
      --faint: #6b6960;
      --acc-blue: #7ab0e8;
      --acc-blue-bg: #0d2040;
      --acc-blue-border: #1e4070;
      --acc-green: #6abf8a;
      --acc-green-bg: #0d2a1a;
      --acc-green-border: #1a4a2e;
      --acc-amber: #d4a040;
      --acc-amber-bg: #2a1a00;
      --acc-amber-border: #4a3000;
      --acc-purple: #a080e0;
      --acc-purple-bg: #1a1030;
      --acc-purple-border: #2e1e58;
      --acc-coral: #e08070;
      --acc-coral-bg: #2a0e08;
      --acc-coral-border: #4a1c14;
      --acc-teal: #60c0c0;
      --acc-teal-bg: #0a2020;
      --acc-teal-border: #1a3a3a;
    }
  .b-refl { background: #2a0a30; color: #d090f0; border: 1px solid #5a2070; }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
    line-height: 1.5;
    padding: 0 0 60px;
  }
  /* ── HEADER ── */
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 20px 20px 0;
    position: sticky; top: 0; z-index: 100;
    box-shadow: var(--shadow);
  }
  .header h1 { font-size: 18px; font-weight: 600; letter-spacing: -0.3px; margin-bottom: 2px; }
  .header p { font-size: 12px; color: var(--muted); margin-bottom: 14px; }
  /* ── FILTER BAR ── */
  .filters { display: flex; flex-wrap: wrap; gap: 6px; padding-bottom: 14px; }
  .filter-group { display: flex; gap: 4px; }
  .sep { width: 1px; background: var(--border); margin: 0 4px; }
  button.f {
    border: 1px solid var(--border2);
    background: transparent;
    color: var(--muted);
    font-size: 12px;
    font-weight: 500;
    padding: 5px 11px;
    border-radius: 20px;
    cursor: pointer;
    transition: all .15s;
    white-space: nowrap;
    font-family: inherit;
  }
  button.f:hover { color: var(--text); border-color: var(--text); }
  button.f.active-all  { background: var(--text); color: var(--bg); border-color: var(--text); }
  button.f.active-acc  { background: var(--acc-blue-bg); color: var(--acc-blue); border-color: var(--acc-blue-border); }
  button.f.active-dat  { background: var(--acc-green-bg); color: var(--acc-green); border-color: var(--acc-green-border); }
  button.f.active-both { background: var(--acc-amber-bg); color: var(--acc-amber); border-color: var(--acc-amber-border); }
  button.f.active-modal{ background: var(--acc-purple-bg); color: var(--acc-purple); border-color: var(--acc-purple-border); }
  button.f.active-sep  { background: var(--acc-teal-bg); color: var(--acc-teal); border-color: var(--acc-teal-border); }
  button.f.active-irreg{ background: var(--acc-coral-bg); color: var(--acc-coral); border-color: var(--acc-coral-border); }
  button.f.active-reg  { background: var(--acc-green-bg); color: var(--acc-green); border-color: var(--acc-green-border); }
  button.f.active-refl { background: #fdf0fb; color: #7a2090; border-color: #d9a0e8; }
  /* ── SEARCH ── */
  .search-wrap { padding: 10px 20px 0; }
  .search-wrap input {
    width: 100%; padding: 8px 14px;
    border: 1px solid var(--border2);
    border-radius: var(--radius);
    background: var(--surface);
    color: var(--text);
    font-size: 13px;
    font-family: inherit;
    outline: none;
    transition: border-color .15s;
  }
  .search-wrap input:focus { border-color: var(--acc-blue); }
  .search-wrap input::placeholder { color: var(--faint); }
  /* ── SECTION LABEL ── */
  .section-label {
    font-size: 10px; font-weight: 600; letter-spacing: .1em;
    text-transform: uppercase; color: var(--faint);
    padding: 18px 20px 6px;
  }
  /* ── VERB CARD ── */
  .verb-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin: 0 20px 10px;
    overflow: hidden;
    transition: border-color .15s;
  }
  .verb-card:hover { border-color: var(--border2); }
  .verb-head {
    display: flex; align-items: center; gap: 8px;
    padding: 12px 14px 10px;
    cursor: pointer;
    user-select: none;
    gap: 10px;
  }
  .verb-name {
    font-size: 15px; font-weight: 600; letter-spacing: -0.2px;
    flex: 0 0 auto;
  }
  .verb-meaning {
    font-size: 13px; color: var(--muted);
    flex: 1 1 auto;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .badges { display: flex; gap: 5px; flex: 0 0 auto; }
  .badge {
    font-size: 10px; font-weight: 600; padding: 2px 7px;
    border-radius: 10px; letter-spacing: .03em;
    white-space: nowrap;
  }
  .b-reg   { background: var(--acc-green-bg);  color: var(--acc-green);  border: 1px solid var(--acc-green-border); }
  .b-irreg { background: var(--acc-coral-bg);  color: var(--acc-coral);  border: 1px solid var(--acc-coral-border); }
  .b-sep   { background: var(--acc-teal-bg);   color: var(--acc-teal);   border: 1px solid var(--acc-teal-border); }
  .b-modal { background: var(--acc-purple-bg); color: var(--acc-purple); border: 1px solid var(--acc-purple-border); }
  .b-acc   { background: var(--acc-blue-bg);   color: var(--acc-blue);   border: 1px solid var(--acc-blue-border); }
  .b-dat   { background: var(--acc-green-bg);  color: var(--acc-green);  border: 1px solid var(--acc-green-border); }
  .b-refl  { background: #fdf0fb; color: #7a2090; border: 1px solid #d9a0e8; }
  .b-both  { background: var(--acc-amber-bg);  color: var(--acc-amber);  border: 1px solid var(--acc-amber-border); }
  .chevron { margin-left: auto; color: var(--faint); font-size: 11px; transition: transform .2s; flex: 0 0 auto; }
  .verb-card.open .chevron { transform: rotate(90deg); }
  /* ── VERB BODY ── */
  .verb-body { display: none; border-top: 1px solid var(--border); padding: 14px; }
  .verb-card.open .verb-body { display: block; }
  /* PP2 row */
  .pp2-row { font-size: 12px; color: var(--muted); margin-bottom: 12px; }
  .pp2-row strong { color: var(--text); }
  /* Conjugation table */
  .conj-table { width: 100%; border-collapse: collapse; margin-bottom: 12px; font-size: 12px; }
  .conj-table th {
    text-align: left; padding: 5px 8px;
    background: var(--bg); color: var(--faint);
    font-weight: 500; font-size: 11px;
    border-bottom: 1px solid var(--border);
  }
  .conj-table td {
    padding: 5px 8px;
    border-bottom: 1px solid var(--border);
    color: var(--text);
  }
  .conj-table tr:last-child td { border-bottom: none; }
  .conj-table .pronoun { color: var(--muted); width: 90px; }
  .conj-table .form { font-weight: 500; }
  /* Example */
  .example-box {
    background: var(--bg);
    border-left: 3px solid var(--border2);
    border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
    padding: 8px 12px;
    font-size: 12px;
  }
  .example-de { font-weight: 500; margin-bottom: 2px; }
  .example-en { color: var(--muted); }
  /* Note */
  .note {
    font-size: 11px; color: var(--muted);
    margin-top: 8px; font-style: italic;
  }
  /* ── EMPTY STATE ── */
  .empty { text-align: center; padding: 40px 20px; color: var(--faint); font-size: 13px; }
  /* ── STATS BAR ── */
  .stats { font-size: 11px; color: var(--faint); padding: 10px 20px 0; }
  /* ── CHEATSHEET ── */
  .cheat {
    margin: 16px 20px 0;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }
  .cheat-head {
    padding: 10px 14px; font-size: 12px; font-weight: 600;
    cursor: pointer; display: flex; justify-content: space-between;
    align-items: center; background: var(--bg);
    border-bottom: 1px solid var(--border);
    user-select: none;
  }
  .cheat-body { display: none; padding: 14px; }
  .cheat.open .cheat-body { display: block; }
  .cheat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  @media (max-width: 500px) { .cheat-grid { grid-template-columns: 1fr; } }
  .cheat-section h4 { font-size: 11px; font-weight: 600; color: var(--faint); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 8px; }
  .cheat-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .cheat-table th { text-align: left; font-weight: 600; padding: 4px 6px; color: var(--muted); font-size: 11px; border-bottom: 1px solid var(--border); }
  .cheat-table td { padding: 4px 6px; border-bottom: 1px solid var(--border); }
  .cheat-table tr:last-child td { border-bottom: none; }
  .chip-list { display: flex; flex-wrap: wrap; gap: 4px; }
  .chip {
    font-size: 11px; padding: 2px 7px; border-radius: 10px;
    background: var(--acc-green-bg); color: var(--acc-green);
    border: 1px solid var(--acc-green-border); font-weight: 500;
  }
</style>
</head>
<body>

<div class="header">
  <h1>German Verbs — A1 &amp; A2</h1>
  <p>Goethe-Zertifikat A2 Wortliste · All verb types · Cases · Conjugations · Examples</p>
  <div class="filters">
    <div class="filter-group">
      <button class="f active-all" onclick="setFilter('all',this)">All</button>
    </div>
    <div class="sep"></div>
    <div class="filter-group">
      <button class="f" onclick="setFilter('acc',this)">🔵 Akkusativ</button>
      <button class="f" onclick="setFilter('dat',this)">🟢 Dativ</button>
      <button class="f" onclick="setFilter('both',this)">🟠 Akk + Dat</button>
    </div>
    <div class="sep"></div>
    <div class="filter-group">
      <button class="f" onclick="setFilter('reg',this)">Regular</button>
      <button class="f" onclick="setFilter('irreg',this)">Irregular</button>
      <button class="f" onclick="setFilter('sep',this)">Separable</button>
      <button class="f" onclick="setFilter('modal',this)">Modal</button>
      <button class="f" onclick="setFilter('refl',this)">Reflexive</button>
    </div>
  </div>
</div>

<div class="search-wrap">
  <input type="text" id="search" placeholder="Search verb or meaning… e.g. kaufen, to buy" oninput="render()">
</div>

<div class="stats" id="stats"></div>
<div id="cheat-container"></div>
<div id="verb-list"></div>

<script>
const VERBS = [
  // ─── AKKUSATIV ───────────────────────────────────────
  { v:"haben", pp2:"gehabt", type:"irreg", case_:"acc", meaning:"to have",
    conj:[["ich","habe"],["du","hast"],["er/sie/es","hat"],["wir","haben"],["ihr","habt"],["sie/Sie","haben"]],
    de:"Ich habe einen Hund.", en:"I have a dog." },
  { v:"sein", pp2:"gewesen", type:"irreg", case_:"acc", meaning:"to be",
    conj:[["ich","bin"],["du","bist"],["er/sie/es","ist"],["wir","sind"],["ihr","seid"],["sie/Sie","sind"]],
    de:"Er ist Mechaniker.", en:"He is a mechanic." },
  { v:"werden", pp2:"geworden", type:"irreg", case_:"acc", meaning:"to become / will (future)",
    conj:[["ich","werde"],["du","wirst"],["er/sie/es","wird"],["wir","werden"],["ihr","werdet"],["sie/Sie","werden"]],
    de:"Mein Sohn will Arzt werden.", en:"My son wants to become a doctor." },
  { v:"machen", pp2:"gemacht", type:"reg", case_:"acc", meaning:"to do / make",
    conj:[["ich","mache"],["du","machst"],["er/sie/es","macht"],["wir","machen"],["ihr","macht"],["sie/Sie","machen"]],
    de:"Er macht Hausaufgaben.", en:"He does homework." },
  { v:"kaufen", pp2:"gekauft", type:"reg", case_:"acc", meaning:"to buy",
    conj:[["ich","kaufe"],["du","kaufst"],["er/sie/es","kauft"],["wir","kaufen"],["ihr","kauft"],["sie/Sie","kaufen"]],
    de:"Ich kaufe einen Apfel.", en:"I buy an apple." },
  { v:"sehen", pp2:"gesehen", type:"irreg", case_:"acc", meaning:"to see",
    conj:[["ich","sehe"],["du","siehst"],["er/sie/es","sieht"],["wir","sehen"],["ihr","seht"],["sie/Sie","sehen"]],
    de:"Sie sieht einen Film.", en:"She watches a film." },
  { v:"kennen", pp2:"gekannt", type:"irreg", case_:"acc", meaning:"to know (person/place)",
    conj:[["ich","kenne"],["du","kennst"],["er/sie/es","kennt"],["wir","kennen"],["ihr","kennt"],["sie/Sie","kennen"]],
    de:"Ich kenne diesen Mann.", en:"I know this man." },
  { v:"kennenlernen", pp2:"kennengelernt", type:"sep", case_:"acc", meaning:"to get to know / meet",
    conj:[["ich","lerne … kennen"],["du","lernst … kennen"],["er/sie/es","lernt … kennen"],["wir","lernen … kennen"],["ihr","lernt … kennen"],["sie/Sie","lernen … kennen"]],
    de:"Wo habt ihr euch kennengelernt?", en:"Where did you meet each other?" },
  { v:"wissen", pp2:"gewusst", type:"irreg", case_:"acc", meaning:"to know (a fact)",
    conj:[["ich","weiß"],["du","weißt"],["er/sie/es","weiß"],["wir","wissen"],["ihr","wisst"],["sie/Sie","wissen"]],
    de:"Ich weiß die Antwort.", en:"I know the answer." },
  { v:"lieben", pp2:"geliebt", type:"reg", case_:"acc", meaning:"to love",
    conj:[["ich","liebe"],["du","liebst"],["er/sie/es","liebt"],["wir","lieben"],["ihr","liebt"],["sie/Sie","lieben"]],
    de:"Er liebt seine Frau.", en:"He loves his wife." },
  { v:"brauchen", pp2:"gebraucht", type:"reg", case_:"acc", meaning:"to need",
    conj:[["ich","brauche"],["du","brauchst"],["er/sie/es","braucht"],["wir","brauchen"],["ihr","braucht"],["sie/Sie","brauchen"]],
    de:"Ich brauche einen Stift.", en:"I need a pen." },
  { v:"lesen", pp2:"gelesen", type:"irreg", case_:"acc", meaning:"to read",
    conj:[["ich","lese"],["du","liest"],["er/sie/es","liest"],["wir","lesen"],["ihr","lest"],["sie/Sie","lesen"]],
    de:"Sie liest ein Buch.", en:"She reads a book." },
  { v:"trinken", pp2:"getrunken", type:"irreg", case_:"acc", meaning:"to drink",
    conj:[["ich","trinke"],["du","trinkst"],["er/sie/es","trinkt"],["wir","trinken"],["ihr","trinkt"],["sie/Sie","trinken"]],
    de:"Er trinkt einen Kaffee.", en:"He drinks a coffee." },
  { v:"essen", pp2:"gegessen", type:"irreg", case_:"acc", meaning:"to eat",
    conj:[["ich","esse"],["du","isst"],["er/sie/es","isst"],["wir","essen"],["ihr","esst"],["sie/Sie","essen"]],
    de:"Wir essen einen Kuchen.", en:"We eat a cake." },
  { v:"schreiben", pp2:"geschrieben", type:"irreg", case_:"acc", meaning:"to write",
    conj:[["ich","schreibe"],["du","schreibst"],["er/sie/es","schreibt"],["wir","schreiben"],["ihr","schreibt"],["sie/Sie","schreiben"]],
    de:"Ich schreibe einen Brief.", en:"I write a letter." },
  { v:"nehmen", pp2:"genommen", type:"irreg", case_:"acc", meaning:"to take",
    conj:[["ich","nehme"],["du","nimmst"],["er/sie/es","nimmt"],["wir","nehmen"],["ihr","nehmt"],["sie/Sie","nehmen"]],
    de:"Sie nimmt den Bus.", en:"She takes the bus." },
  { v:"finden", pp2:"gefunden", type:"irreg", case_:"acc", meaning:"to find / think (opinion)",
    conj:[["ich","finde"],["du","findest"],["er/sie/es","findet"],["wir","finden"],["ihr","findet"],["sie/Sie","finden"]],
    de:"Ich finde den Schlüssel.", en:"I find the key." },
  { v:"hören", pp2:"gehört", type:"reg", case_:"acc", meaning:"to hear / listen to",
    conj:[["ich","höre"],["du","hörst"],["er/sie/es","hört"],["wir","hören"],["ihr","hört"],["sie/Sie","hören"]],
    de:"Ich höre Musik.", en:"I listen to music." },
  { v:"verstehen", pp2:"verstanden", type:"irreg", case_:"acc", meaning:"to understand",
    conj:[["ich","verstehe"],["du","verstehst"],["er/sie/es","versteht"],["wir","verstehen"],["ihr","versteht"],["sie/Sie","verstehen"]],
    de:"Er versteht die Frage.", en:"He understands the question." },
  { v:"lernen", pp2:"gelernt", type:"reg", case_:"acc", meaning:"to learn / study",
    conj:[["ich","lerne"],["du","lernst"],["er/sie/es","lernt"],["wir","lernen"],["ihr","lernt"],["sie/Sie","lernen"]],
    de:"Sie lernt Deutsch.", en:"She learns German." },
  { v:"suchen", pp2:"gesucht", type:"reg", case_:"acc", meaning:"to look for / search",
    conj:[["ich","suche"],["du","suchst"],["er/sie/es","sucht"],["wir","suchen"],["ihr","sucht"],["sie/Sie","suchen"]],
    de:"Ich suche meinen Schlüssel.", en:"I'm looking for my key." },
  { v:"besuchen", pp2:"besucht", type:"reg", case_:"acc", meaning:"to visit",
    conj:[["ich","besuche"],["du","besuchst"],["er/sie/es","besucht"],["wir","besuchen"],["ihr","besucht"],["sie/Sie","besuchen"]],
    de:"Wir besuchen unsere Eltern.", en:"We visit our parents." },
  { v:"bezahlen", pp2:"bezahlt", type:"reg", case_:"acc", meaning:"to pay for",
    conj:[["ich","bezahle"],["du","bezahlst"],["er/sie/es","bezahlt"],["wir","bezahlen"],["ihr","bezahlt"],["sie/Sie","bezahlen"]],
    de:"Er bezahlt die Rechnung.", en:"He pays the bill." },
  { v:"zahlen", pp2:"gezahlt", type:"reg", case_:"acc", meaning:"to pay",
    conj:[["ich","zahle"],["du","zahlst"],["er/sie/es","zahlt"],["wir","zahlen"],["ihr","zahlt"],["sie/Sie","zahlen"]],
    de:"Entschuldigung, zahlen bitte!", en:"Excuse me, the bill please!" },
  { v:"spielen", pp2:"gespielt", type:"reg", case_:"acc", meaning:"to play",
    conj:[["ich","spiele"],["du","spielst"],["er/sie/es","spielt"],["wir","spielen"],["ihr","spielt"],["sie/Sie","spielen"]],
    de:"Die Kinder spielen Fußball.", en:"The children play football." },
  { v:"tragen", pp2:"getragen", type:"irreg", case_:"acc", meaning:"to wear / carry",
    conj:[["ich","trage"],["du","trägst"],["er/sie/es","trägt"],["wir","tragen"],["ihr","tragt"],["sie/Sie","tragen"]],
    de:"Sie trägt eine rote Jacke.", en:"She wears a red jacket." },
  { v:"beginnen", pp2:"begonnen", type:"irreg", case_:"acc", meaning:"to begin / start",
    conj:[["ich","beginne"],["du","beginnst"],["er/sie/es","beginnt"],["wir","beginnen"],["ihr","beginnt"],["sie/Sie","beginnen"]],
    de:"Er beginnt die Arbeit.", en:"He begins the work." },
  { v:"vergessen", pp2:"vergessen", type:"irreg", case_:"acc", meaning:"to forget",
    conj:[["ich","vergesse"],["du","vergisst"],["er/sie/es","vergisst"],["wir","vergessen"],["ihr","vergesst"],["sie/Sie","vergessen"]],
    de:"Ich vergesse den Termin.", en:"I forget the appointment." },
  { v:"bekommen", pp2:"bekommen", type:"irreg", case_:"acc", meaning:"to receive / get",
    conj:[["ich","bekomme"],["du","bekommst"],["er/sie/es","bekommt"],["wir","bekommen"],["ihr","bekommt"],["sie/Sie","bekommen"]],
    de:"Haben Sie meinen Brief bekommen?", en:"Did you receive my letter?" },
  { v:"bestellen", pp2:"bestellt", type:"reg", case_:"acc", meaning:"to order",
    conj:[["ich","bestelle"],["du","bestellst"],["er/sie/es","bestellt"],["wir","bestellen"],["ihr","bestellt"],["sie/Sie","bestellen"]],
    de:"Wir möchten bitte bestellen.", en:"We would like to order please." },
  { v:"braten", pp2:"gebraten", type:"irreg", case_:"acc", meaning:"to fry / roast",
    conj:[["ich","brate"],["du","brätst"],["er/sie/es","brät"],["wir","braten"],["ihr","bratet"],["sie/Sie","braten"]],
    de:"Braten Sie das Fleisch in etwas Öl!", en:"Fry the meat in a little oil!" },

    de:"Ich stelle dir (Dat) meinen Freund (Akk) vor.", en:"I introduce my friend to you." },
  { v:"mitbringen", pp2:"mitgebracht", type:"sep", case_:"both", meaning:"to bring along",

  { v:"sich erkälten", pp2:"erkältet", type:"reg", case_:"acc", meaning:"to catch a cold",

    conj:[["ich erkälte","mich"],["du erkältest","dich"],["er/sie/es erkältet","sich"],["wir erkälten","uns"],["ihr erkältet","euch"],["sie/Sie erkälten","sich"]],

    refl:true,

    note:"Präteritum of werden. Used to form: (1) simple past of werden — Er wurde Arzt; (2) Passiv (passive voice) — Die Tür wurde geöffnet = The door was opened." },

const CASE_LABELS = { acc:"Akkusativ", dat:"Dativ", both:"Akk+Dat" };
const TYPE_LABELS  = { reg:"Regular", irreg:"Irregular", sep:"Separable", modal:"Modal" };
const CASE_ORDER   = { acc:0, dat:1, both:2 };
const SECTION_NAMES = { acc:"🔵 Akkusativ Verbs", dat:"🟢 Dativ Verbs", both:"🟠 Akkusativ + Dativ Verbs" };

let activeFilter = 'all';

function setFilter(f, btn) {
  activeFilter = f;
  document.querySelectorAll('.f').forEach(b => {
    b.className = 'f';
  });
  const cls = f === 'all' ? 'active-all' : f === 'acc' ? 'active-acc' : f === 'dat' ? 'active-dat'
    : f === 'both' ? 'active-both' : f === 'modal' ? 'active-modal' : f === 'sep' ? 'active-sep'
    : f === 'irreg' ? 'active-irreg' : f === 'refl' ? 'active-refl' : 'active-reg';
  btn.classList.add(cls);
  render();
}

function render() {
  const q = document.getElementById('search').value.toLowerCase().trim();
  let verbs = VERBS.filter(v => {
    if (activeFilter === 'all') return true;
    if (['acc','dat','both'].includes(activeFilter)) return v.case_ === activeFilter;
    return v.type === activeFilter;
  }).filter(v => {
    if (!q) return true;
    return v.v.toLowerCase().includes(q) || v.meaning.toLowerCase().includes(q)
      || v.pp2.toLowerCase().includes(q) || v.de.toLowerCase().includes(q);
  });

  document.getElementById('stats').textContent = `${verbs.length} verb${verbs.length !== 1 ? 's' : ''} shown`;

  // Cheatsheet (only on full/modal view)
  const cc = document.getElementById('cheat-container');
  if (!q && (activeFilter === 'all' || activeFilter === 'modal')) {
    cc.innerHTML = buildCheatsheet();
  } else { cc.innerHTML = ''; }

  // Group by case
  const groups = { acc:[], dat:[], both:[] };
  verbs.forEach(v => {
    const g = ['acc','dat','both'].includes(v.case_) ? v.case_ : 'acc';
    groups[g].push(v);
  });

  let html = '';
  ['acc','dat','both'].forEach(g => {
    if (!groups[g].length) return;
    html += `<div class="section-label">${SECTION_NAMES[g]} (${groups[g].length})</div>`;
    groups[g].forEach((v, i) => {
      const id = `card-${g}-${i}`;
      html += `
      <div class="verb-card" id="${id}">
        <div class="verb-head" onclick="toggle('${id}')">
          <span class="verb-name">${v.v}</span>
          <span class="verb-meaning">${v.meaning}</span>
          <div class="badges">
            <span class="badge b-${v.type}">${TYPE_LABELS[v.type]}</span>
            <span class="badge b-${v.case_}">${CASE_LABELS[v.case_]}</span>
            ${v.refl ? '<span class="badge b-refl">Reflexive</span>' : ''}
          </div>
          <span class="chevron">▶</span>
        </div>
        <div class="verb-body">
          <div class="pp2-row">Partizip II: <strong>${v.pp2}</strong>${v.refl ? '&nbsp;&nbsp;·&nbsp;&nbsp;Reflexivpronomen: <strong>mich/dich/sich/uns/euch/sich</strong>' : ''}</div>
          ${(function(){
            const c = v.conj;
            const fmt = (row) => v.refl && row[1] ? row[0] + ' <strong>' + row[1] + '</strong>' : (row[1] || row[0]);
            const pro = (row) => v.refl && row[1] ? '' : row[0];
            if(v.refl && c[0][1]) {
              return '<table class="conj-table"><tr><th colspan="2">Form</th><th colspan="2">Form</th></tr>' +
                '<tr><td class="pronoun" style="width:50%">' + c[0][0] + ' <strong>' + c[0][1] + '</strong></td><td></td>' +
                '<td class="pronoun" style="width:50%">' + c[3][0] + ' <strong>' + c[3][1] + '</strong></td><td></td></tr>' +
                '<tr><td class="pronoun">' + c[1][0] + ' <strong>' + c[1][1] + '</strong></td><td></td>' +
                '<td class="pronoun">' + c[4][0] + ' <strong>' + c[4][1] + '</strong></td><td></td></tr>' +
                '<tr><td class="pronoun">' + c[2][0] + ' <strong>' + c[2][1] + '</strong></td><td></td>' +
                '<td class="pronoun">' + c[5][0] + ' <strong>' + c[5][1] + '</strong></td><td></td></tr>' +
                '</table>';
            }
            return '<table class="conj-table"><tr><th>Pronoun</th><th>Form</th><th>Pronoun</th><th>Form</th></tr>' +
              '<tr><td class="pronoun">' + c[0][0] + '</td><td class="form">' + c[0][1] + '</td>' +
              '<td class="pronoun">' + c[3][0] + '</td><td class="form">' + c[3][1] + '</td></tr>' +
              '<tr><td class="pronoun">' + c[1][0] + '</td><td class="form">' + c[1][1] + '</td>' +
              '<td class="pronoun">' + c[4][0] + '</td><td class="form">' + c[4][1] + '</td></tr>' +
              '<tr><td class="pronoun">' + c[2][0] + '</td><td class="form">' + c[2][1] + '</td>' +
              '<td class="pronoun">' + c[5][0] + '</td><td class="form">' + c[5][1] + '</td></tr>' +
              '</table>';
          })()}
          <div class="example-box">
            <div class="example-de">${v.de}</div>
            <div class="example-en">${v.en}</div>
          </div>
" + (v.note ? '<div class="note">💡 ' + v.note + '</div>' : '') + "
        </div>
      </div>`;
    });
  });

  if (!html) html = '<div class="empty">No verbs found. Try a different search or filter.</div>';
  document.getElementById('verb-list').innerHTML = html;
}

function toggle(id) {
  document.getElementById(id).classList.toggle('open');
}

    <div class="cheat-body">
      <div class="cheat-grid">
        <div class="cheat-section">

            <span class="chip">antworten</span><span class="chip">glauben</span>
            <span class="chip">gratulieren</span><span class="chip">passieren</span>
            <span class="chip">zuhören</span>
          </div>
        </div>
        <div class="cheat-section" style="grid-column:1/-1">
          <h4>Key irregular Partizip II forms</h4>
          <table class="cheat-table">
            <tr>
              <th>Infinitiv</th><th>PP2</th>
              <th>Infinitiv</th><th>PP2</th>
              <th>Infinitiv</th><th>PP2</th>
            </tr>
            <tr><td>sein</td><td>gewesen</td><td>haben</td><td>gehabt</td><td>werden</td><td>geworden</td></tr>
            <tr><td>gehen</td><td>gegangen</td><td>fahren</td><td>gefahren</td><td>laufen</td><td>gelaufen</td></tr>
            <tr><td>essen</td><td>gegessen</td><td>trinken</td><td>getrunken</td><td>schlafen</td><td>geschlafen</td></tr>
            <tr><td>sehen</td><td>gesehen</td><td>lesen</td><td>gelesen</td><td>nehmen</td><td>genommen</td></tr>
            <tr><td>geben</td><td>gegeben</td><td>schreiben</td><td>geschrieben</td><td>sprechen</td><td>gesprochen</td></tr>
            <tr><td>finden</td><td>gefunden</td><td>treffen</td><td>getroffen</td><td>helfen</td><td>geholfen</td></tr>
            <tr><td>wissen</td><td>gewusst</td><td>denken</td><td>gedacht</td><td>bringen</td><td>gebracht</td></tr>
            <tr><td>verlieren</td><td>verloren</td><td>verstehen</td><td>verstanden</td><td>bleiben</td><td>geblieben</td></tr>
            <tr><td>waschen</td><td>gewaschen</td><td>tragen</td><td>getragen</td><td>sterben</td><td>gestorben</td></tr>
          </table>
        </div>
      </div>
    </div>
  </div>`;
}

render();
</script>
